name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-cli:
    name: Verify CLI and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build:cli

      - name: Typecheck CLI
        run: pnpm typecheck:cli

      - name: Run CLI fixture tests
        run: pnpm test:cli

      - name: Upload fixture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-test-sources
          path: |
            tests/node
            tests/fixtures
          if-no-files-found: error
