name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-cli:
    name: Verify CLI and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build:cli

      - name: Typecheck CLI
        run: pnpm typecheck:cli

      - name: Run CLI fixture tests
        run: pnpm test:cli

      - name: Upload fixture artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cli-test-sources
          path: |
            tests/node
            tests/fixtures
          if-no-files-found: error