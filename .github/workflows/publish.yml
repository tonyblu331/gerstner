name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install
      - run: vp check
      - run: cd packages/debug && vp pack
      - run: cd packages/cli && vp pack

      # then publish gerstner, @gerstner/debug, @gerstner/cli
      # exact npm publish steps depend on your token strategy and release automation
