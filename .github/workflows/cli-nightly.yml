name: CLI Nightly

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Node 24 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          check-latest: true
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify CLI
        run: pnpm ci:cli
