name: CLI Nightly

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Node 24 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          check-latest: true
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify CLI
        run: pnpm ci:cli
