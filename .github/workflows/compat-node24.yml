name: compat-node24

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: '24'
          cache: true

      - run: vp install
      - run: vp check
      - run: cd packages/debug && vp pack
      - run: cd packages/cli && vp pack && vp test
