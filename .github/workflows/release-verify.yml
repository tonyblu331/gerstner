name: release-verify

# VERIFICATION ONLY - Not ready for actual publishing yet
# This workflow verifies packages are buildable before release
# TODO: Add proper vp pack configs for packages/debug and packages/cli
# TODO: Set up npm auth and actual publish steps

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: '22'
          cache: true

      - run: vp install
      - run: vp check
      - run: cd packages/debug && vp pack
      - run: cd packages/cli && vp pack

      # TODO: Add actual npm publish steps here
      # For now, this just verifies packages build correctly
