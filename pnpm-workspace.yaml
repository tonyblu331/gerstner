packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@playwright/test': 1.58.2
  '@types/node': 24.0.0
  '@tailwindcss/vite': 4.1.0
  syncpack: 14.2.1
  tailwindcss: 4.1.0
  tsdown: 0.3.1
  typescript: 6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
