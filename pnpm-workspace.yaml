packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@playwright/test': ^1
  '@types/node': ^24
  '@tailwindcss/vite': ^4
  syncpack: ^14.2.1
  tailwindcss: ^4
  tsdown: ^0
  typescript: ^6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
